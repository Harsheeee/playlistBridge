services:
  # 1. PostgreSQL Database
  - type: pgo
    name: playlistbridge-db
    plan: free
    postgresMajorVersion: 15

  # 2. Redis (Used for Celery Broker & Backend)
  - type: redis
    name: playlistbridge-redis
    plan: free
    ipAllowList: [] # internal access only

  # 3. FastAPI Web Service
  - type: web
    name: playlistbridge-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playlistbridge-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: playlistbridge-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: playlistbridge-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false # Set this in Render dashboard after Vercel deployment
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256

  # 4. Celery Worker Process
  - type: worker
    name: playlistbridge-worker
    env: docker
    region: oregon
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A app.core.celery_app.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playlistbridge-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: playlistbridge-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: playlistbridge-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false 
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
